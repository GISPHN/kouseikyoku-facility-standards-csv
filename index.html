<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kouseikyoku Facility Standards CSV Converter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="masthead">
          <div>
            <p class="eyebrow">Nationwide Kouseikyoku Excel to CSV</p>
            <h1>Kouseikyoku Facility Standards CSV Converter</h1>
          </div>
          <a class="source-link" href="https://kouseikyoku.mhlw.go.jp/kinki/gyomu/gyomu/hoken_kikan/shitei_jokyo_00004.html" target="_blank" rel="noreferrer">公開元</a>
        </div>

        <form id="convertForm" class="uploader">
          <p class="help-text">投入するExcelは、各厚生支局の「施設基準の届出受理状況（全体）（届出受理医療機関名簿）」のExcelファイルを使用してください。</p>
          <p class="help-text">ジオコーディング結果は住所検索による候補位置です。施設の入口や建物中心など、ピンポイントの位置を保証するものではありません。</p>

          <label class="dropzone" for="pdfFile">
            <span class="drop-title">Excelを選択</span>
            <span id="fileName" class="drop-subtitle">厚生局公開の施設基準Excel</span>
            <input id="pdfFile" name="excel" type="file" accept=".xlsx,.xlsm,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" required />
          </label>

          <label class="switch">
            <input id="geocode" name="geocode" type="checkbox" checked />
            <span>国土地理院APIで緯度・経度を付与（500ms間隔固定）</span>
          </label>

          <label class="switch">
            <input id="wideOutput" name="wideOutput" type="checkbox" />
            <span>医療機関別の届出横持ちCSVも作成</span>
          </label>

          <button id="submitButton" type="submit">CSVを作成</button>
        </form>

        <div id="status" class="status" role="status">待機中</div>
        <progress id="progress" class="progress" max="100" value="0" hidden></progress>
      </section>

      <section class="schema">
        <h2>出力列</h2>
        <div class="columns">
          <span>法人名</span>
          <span>病院名</span>
          <span>住所</span>
          <span>病床数</span>
          <span>届出項目</span>
          <span>受理番号</span>
          <span>開始年月日</span>
          <span>緯度</span>
          <span>経度</span>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
